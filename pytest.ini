[pytest]
# Each assignment folder is self-contained: its test_assignment.py imports from
# its sibling solution.py. Students run ONE assignment at a time from the
# Codespaces Testing panel. `importlib` import mode lets the repeated
# `test_assignment.py` / `solution.py` filenames coexist across folders.
addopts = --import-mode=importlib
python_files = test_assignment.py
python_functions = test_*
